  "linear-gradient(135deg,#3a3a1a,#6a6a2d)","linear-gradient(135deg,#1a3a1a,#2d6a2d)",
  "linear-gradient(135deg,#2a2a3a,#4a4a6a)","linear-gradient(135deg,#3a1a1a,#6a2d2d)",
  "linear-gradient(135deg,#1a2a2a,#2d4a4a)","linear-gradient(135deg,#2a1a2a,#4a2d4a)",
  "linear-gradient(135deg,#2a3a2a,#3d6a3f)","linear-gradient(135deg,#1a2a1a,#2d5a2d)",
];
function Card({ s, active, onTap, stages, tk, th }) {
  const i = s.id - 1;
  const done = stages.slice(0, i).reduce((a, x) => a + x.km, 0);
  const kmPct = Math.round((done + s.km) / tk * 100);
  const hmDone = stages.slice(0, i + 1).reduce((a, x) => a + parseInt(x.el), 0);
  const hmPct = Math.round(hmDone / th * 100);
  return (
    <div onClick={onTap} style={{
      background: bgs[i % 16], borderRadius: 14, padding: 16, marginBottom: 10,
      border: active ? "2px solid #f97316" : "2px solid rgba(255,255,255,0.06)",
      cursor: active ? "default" : "pointer",
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
        <div>
          <div style={{ fontSize: 10, fontWeight: 700, color: "#f97316", letterSpacing: 1.5 }}>TAG {s.id}</div>
          <div style={{ fontSize: 17, fontWeight: 800, color: "#fff", marginTop: 2, lineHeight: 1.2 }}>{s.t}</div>
        </div>
        <div style={{ fontSize: 28 }}>{s.e}</div>
      </div>
      <div style={{ display: "flex", gap: 10, marginBottom: 6 }}>
        <div style={{ flex: 1, background: "rgba(249,115,22,0.12)", borderRadius: 8, padding: "6px 8px", textAlign: "center" }}>
          <div style={{ fontSize: 20, fontWeight: 800, color: "#facc15" }}>{s.km}</div>
          <div style={{ fontSize: 9, color: "rgba(255,255,255,0.45)", fontWeight: 600, letterSpacing: 1 }}>KM</div>
        </div>
        <div style={{ flex: 1, background: "rgba(249,115,22,0.12)", borderRadius: 8, padding: "6px 8px", textAlign: "center" }}>
          <div style={{ fontSize: 14, fontWeight: 800, color: "#facc15" }}>{s.el}</div>
          <div style={{ fontSize: 9, color: "rgba(255,255,255,0.45)", fontWeight: 600, letterSpacing: 1 }}>HÖHE</div>
        </div>
        <div style={{ flex: 1.5, display: "flex", alignItems: "center", justifyContent: "center" }}>
          <div style={{ fontSize: 10, color: "rgba(255,255,255,0.35)" }}>km {done} – {done + s.km}</div>
        </div>
      </div>
      <div style={{ background: "rgba(249,115,22,0.08)", borderRadius: 8, padding: "6px 10px", marginBottom: 10 }}>
        <div style={{ fontSize: 9, color: "rgba(255,255,255,0.45)", fontWeight: 600, letterSpacing: 1, marginBottom: 2 }}>HÖHENPROFIL</div>
        <div style={{ fontSize: 12, color: "rgba(255,255,255,0.65)" }}>{s.hp}</div>
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginBottom: 5 }}>
        {s.c.map((x, j) => (
          <span key={j} style={{ fontSize: 10, background: "rgba(59,130,246,0.15)", color: "rgba(147,197,253,0.9)", padding: "3px 9px", borderRadius: 12 }}>📍 {x}</span>
        ))}
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginBottom: 10 }}>
        {s.l.map((x, j) => (
          <span key={j} style={{ fontSize: 10, background: "rgba(34,197,94,0.12)", color: "rgba(134,239,172,0.9)", padding: "3px 9px", borderRadius: 12 }}>🏞️ {x}</span>
        ))}
      </div>
      {s.gr && <div style={{ background: "rgba(255,255,255,0.06)", border: "1px dashed rgba(255,255,255,0.2)", borderRadius: 8, padding: "7px 10px", marginBottom: 10, textAlign: "center" }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: "#facc15" }}>{s.gr}</div>
      </div>}
      <div style={{ background: "rgba(251,146,60,0.08)", borderRadius: 8, padding: "6px 10px", marginBottom: 14 }}>
        <div style={{ fontSize: 9, color: "rgba(255,255,255,0.45)", fontWeight: 600, letterSpacing: 1, marginBottom: 4 }}>VERSORGUNG</div>
        {s.v.map((x, j) => (
          <div key={j} style={{ fontSize: 11, color: "rgba(255,255,255,0.6)", marginBottom: j < s.v.length - 1 ? 2 : 0 }}>{x}</div>
        ))}
      </div>
      <div style={{ display: "flex", gap: 10, marginBottom: 14 }}>
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
            <span style={{ fontSize: 9, color: "rgba(255,255,255,0.4)", fontWeight: 600, letterSpacing: 1 }}>STRECKE</span>
            <span style={{ fontSize: 9, color: "#facc15", fontWeight: 700 }}>{kmPct}%</span>
          </div>
          <div style={{ height: 4, background: "rgba(255,255,255,0.08)", borderRadius: 2 }}>
            <div style={{ height: "100%", width: `${kmPct}%`, background: "linear-gradient(90deg,#f97316,#facc15)", borderRadius: 2 }} />
          </div>
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
            <span style={{ fontSize: 9, color: "rgba(255,255,255,0.4)", fontWeight: 600, letterSpacing: 1 }}>HÖHENMETER</span>
            <span style={{ fontSize: 9, color: "#facc15", fontWeight: 700 }}>{hmPct}%</span>
          </div>
          <div style={{ height: 4, background: "rgba(255,255,255,0.08)", borderRadius: 2 }}>
            <div style={{ height: "100%", width: `${hmPct}%`, background: "linear-gradient(90deg,#f97316,#facc15)", borderRadius: 2 }} />
          </div>
        </div>
      </div>
      <a href={s.u} target="_blank" rel="noopener noreferrer" onClick={e => e.stopPropagation()} style={{
        display: "block", textAlign: "center", background: "linear-gradient(135deg,#f97316,#ea580c)",
        color: "#fff", padding: 12, borderRadius: 10, textDecoration: "none", fontWeight: 700, fontSize: 14,
        boxShadow: "0 3px 12px rgba(249,115,22,0.25)",
      }}>
        ▶ In Google Maps navigieren
      </a>
    </div>
  );
}
function App() {
  const [routeIdx, setRouteIdx] = useState(0);
  const [cur, setCur] = useState(-1);
  const r = allRoutes[routeIdx];
  const stages = r.stages;
  const TK = stages.reduce((a, s) => a + s.km, 0);
  const TH = stages.reduce((a, s) => a + parseInt(s.el), 0);
  const kmDone = cur >= 0 ? stages.slice(0, cur).reduce((a, s) => a + s.km, 0) : 0;
  const switchRoute = (idx) => { setRouteIdx(idx); setCur(-1); };
  return (
    <div style={{ background: "#0a0f0a", minHeight: "100vh", minHeight: "100dvh", maxWidth: 480, margin: "0 auto", fontFamily: "-apple-system,BlinkMacSystemFont,sans-serif" }}>
      <div style={{ display: "flex", gap: 6, padding: "12px 16px 0" }}>
        {allRoutes.map((rt, idx) => (
          <button key={idx} onClick={() => switchRoute(idx)} style={{
            flex: 1, padding: "8px 4px", borderRadius: 10, fontSize: 9, fontWeight: 700, lineHeight: 1.3,
            border: routeIdx === idx ? "2px solid #f97316" : "2px solid rgba(255,255,255,0.1)",
            background: routeIdx === idx ? "rgba(249,115,22,0.15)" : "rgba(255,255,255,0.05)",
            color: routeIdx === idx ? "#facc15" : "rgba(255,255,255,0.4)",
          }}>{rt.name}</button>
        ))}
      </div>
      <div style={{ padding: "12px 16px 12px", borderBottom: "1px solid rgba(255,255,255,0.08)" }}>
        <div style={{ fontSize: 18, fontWeight: 800, color: "#fff", marginBottom: 3 }}>🚲 {r.name}</div>
        <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", letterSpacing: 0.5, marginBottom: 8 }}>{TK} KM · {TH} HM · {stages.length} TAGE{r.extra}</div>
        <div style={{ width: "100%", height: 5, background: "rgba(255,255,255,0.1)", borderRadius: 3 }}>
          <div style={{ height: "100%", width: `${Math.round(kmDone / TK * 100)}%`, background: "linear-gradient(90deg,#f97316,#facc15)", borderRadius: 3, transition: "width 0.4s" }} />
        </div>
      </div>
      <div style={{ display: "flex", gap: 6, padding: "10px 16px", overflowX: "auto", WebkitOverflowScrolling: "touch" }}>
        {stages.map((s, i) => (
          <button key={s.id} onClick={() => setCur(i)} style={{
            flexShrink: 0, width: 28, height: 28, borderRadius: "50%", fontSize: 10, fontWeight: 800,
            border: cur === i ? "2px solid #f97316" : "2px solid rgba(255,255,255,0.12)",
            background: cur === i ? "rgba(249,115,22,0.2)" : "rgba(255,255,255,0.05)",
            color: cur === i ? "#facc15" : "rgba(255,255,255,0.4)",
          }}>{s.id}</button>
        ))}
      </div>
      <div style={{ padding: "0 12px 60px" }}>
        {cur === -1 ? (
          stages.map((s, i) => <Card key={s.id} s={s} active={false} onTap={() => setCur(i)} stages={stages} tk={TK} th={TH} />)
        ) : (
          <>
            <button onClick={() => setCur(-1)} style={{
              background: "none", border: "none", color: "#f97316", fontSize: 13, fontWeight: 600, padding: "8px 0", marginBottom: 8,
            }}>← Alle Tage</button>
            <Card s={stages[cur]} active={true} onTap={() => {}} stages={stages} tk={TK} th={TH} />
            <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
              <button disabled={cur === 0} onClick={() => setCur(cur - 1)} style={{
                flex: 1, padding: 11, borderRadius: 10, border: "1px solid rgba(255,255,255,0.1)",
                background: "rgba(255,255,255,0.05)", color: cur === 0 ? "rgba(255,255,255,0.12)" : "rgba(255,255,255,0.5)",
                fontSize: 13, fontWeight: 600,
              }}>← Vorherige</button>
              <button disabled={cur === stages.length - 1} onClick={() => setCur(cur + 1)} style={{
                flex: 1, padding: 11, borderRadius: 10, border: "1px solid rgba(255,255,255,0.1)",
                background: "rgba(255,255,255,0.05)", color: cur === stages.length - 1 ? "rgba(255,255,255,0.12)" : "rgba(255,255,255,0.5)",
                fontSize: 13, fontWeight: 600,
              }}>Nächste →</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
